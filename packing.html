<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Pakkeliste · Quartz Mølle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#273071; --blue-dark:#1b2252; --blue-light:#3a4599;
    --blue-soft:rgba(39,48,113,.08);
    --cream:#faf7f2; --warm:#f5f0e8; --line:#e7e1d6;
    --text:#1a1611; --muted:#6b6256; --white:#fff;
    --green:#2e8b57; --green-soft:#e6f1ea;
    --red:#b23b3b; --grey:#9b9488; --grey-soft:#ece8e0;
    --shadow:0 4px 18px rgba(39,48,113,.10);
    --radius:18px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--cream);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none}
  a{color:inherit}
  .hide{display:none!important}

  /* login */
  #login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{background:var(--white);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:38px 30px;width:100%;max-width:380px;text-align:center}
  .login-card img{width:96px;height:96px;object-fit:contain;margin-bottom:10px}
  .login-card h1{font-size:20px;font-weight:700;color:var(--blue)}
  .login-card p{color:var(--muted);font-size:14px;margin-top:4px;margin-bottom:24px}
  .code-input{width:100%;text-align:center;font-size:30px;font-weight:700;letter-spacing:10px;color:var(--blue);padding:16px;border:2px solid var(--line);border-radius:14px;background:var(--cream);outline:none}
  .code-input:focus{border-color:var(--blue-light)}
  .login-btn{width:100%;margin-top:16px;background:var(--blue);color:#fff;font-size:17px;font-weight:600;padding:16px;border-radius:14px}
  .login-btn:active{background:var(--blue-dark)}
  .login-err{color:var(--red);font-size:14px;font-weight:500;margin-top:14px;min-height:18px}

  /* topbar */
  .top{position:sticky;top:0;z-index:30;background:var(--blue);color:#fff;display:flex;align-items:center;gap:12px;padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));flex-wrap:wrap}
  .top img{width:36px;height:36px;object-fit:cover;border-radius:50%;background:transparent;padding:0}
  .top .ttl{font-weight:700;font-size:16px;line-height:1.15}
  .top .ttl small{display:block;font-weight:500;font-size:11px;opacity:.8}
  .top .spacer{flex:1}
  .langsw{display:flex;gap:3px;background:rgba(255,255,255,.14);border-radius:10px;padding:3px}
  .langsw button{background:transparent;color:#fff;font-size:12px;font-weight:700;padding:6px 9px;border-radius:8px;opacity:.7}
  .langsw button.on{background:#fff;color:var(--blue);opacity:1}
  .logout{background:rgba(255,255,255,.14);color:#fff;font-size:13px;font-weight:600;padding:8px 12px;border-radius:10px}

  .wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .btn{border-radius:13px;font-size:15px;font-weight:600;padding:14px 18px;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
  .btn:active{transform:translateY(1px)}
  .btn-ghost{background:var(--white);color:var(--blue);border:1.5px solid var(--line)}
  .btn-blue{background:var(--blue);color:#fff}
  .btn-grow{flex:1}

  .summary{margin:20px 2px 6px;font-size:14px;color:var(--muted);font-weight:600}
  .sec-h{margin:14px 2px 12px;font-size:15px;font-weight:700;color:var(--blue)}
  .empty{color:var(--muted);font-size:14px;padding:8px 2px}

  /* total-to-pick summary */
  .pick-total{background:var(--blue);color:#fff;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:8px}
  .pick-total .pt-hint{font-size:13px;opacity:.85;margin-bottom:10px}
  .pt-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.16);font-size:15px}
  .pt-row:last-child{border-bottom:none}
  .pt-row .nm{flex:1;font-weight:600}
  .pt-row .wl{opacity:.8;font-weight:400}
  .pt-badge{background:#fff;color:var(--blue);font-weight:800;border-radius:9px;padding:4px 10px;font-size:15px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .pack-hint{font-size:13px;color:var(--muted);margin:2px 2px 10px}

  .qtybadge{background:var(--blue-soft);color:var(--blue);font-weight:800;border-radius:8px;padding:3px 9px;font-size:14px;white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0}

  .pack{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 3px rgba(39,48,113,.05);margin-bottom:12px}
  .pack-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:baseline}
  .pack-who{font-weight:700;font-size:15px}
  .pack-ref{font-size:11.5px;color:var(--grey);letter-spacing:.04em}
  .pack-items{list-style:none;margin-top:12px}
  .pack-items li{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px}
  .pack-items li:last-child{border-bottom:none}
  .pack-items .chk{width:20px;height:20px;flex-shrink:0;accent-color:var(--green)}
  .pack-items .nm{flex:1}
  .pack-items .wl{color:var(--muted);font-weight:400}
  .pack-items .qty{font-weight:800;color:var(--blue);white-space:nowrap;font-variant-numeric:tabular-nums}
  .pack-items li.done .nm{text-decoration:line-through;color:var(--grey)}
  .pack-count{margin-top:10px;font-size:12.5px;color:var(--muted);font-weight:600}

  @media print{
    .top,.row,.langsw,.logout,.no-print{display:none!important}
    body{background:#fff}
    .pack{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
    .wrap{max-width:none;padding:0}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <img src="/images/logopng.png" alt="Quartz Mølle" onerror="this.style.display='none'">
    <h1 data-i18n="title">Pakkeliste</h1>
    <p data-i18n="enterCode">Indtast adgangskode</p>
    <input id="codeInput" class="code-input" type="password" inputmode="numeric" autocomplete="off" maxlength="10" placeholder="••••">
    <button id="loginBtn" class="login-btn" data-i18n="unlock">Lås op</button>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div class="top">
    <img src="/images/logopng.png" alt="" onerror="this.style.display='none'">
    <div class="ttl"><span data-i18n="title">Pakkeliste</span><small>Click &amp; Collect · Quartz Mølle</small></div>
    <div class="spacer"></div>
    <div class="langsw" id="langsw">
      <button data-lang="da">DA</button>
      <button data-lang="en">EN</button>
      <button data-lang="es">ES</button>
    </div>
    <button class="logout" id="logoutBtn" data-i18n="logout">Log ud</button>
  </div>

  <div class="wrap">
    <div class="row no-print">
      <a class="btn btn-ghost" href="/fufill" data-i18n="back">← Fulfillment</a>
      <button class="btn btn-ghost" id="refreshBtn" data-i18n="refresh">↻ Opdatér</button>
      <button class="btn btn-blue btn-grow" id="printBtn" data-i18n="printList">🖨 Print liste</button>
    </div>

    <div class="summary" id="summary"></div>

    <div class="sec-h" data-i18n="pickTotal">Samlet plukkeliste</div>
    <div id="pickTotal"></div>

    <div class="sec-h" data-i18n="toPack">Ordrer at pakke</div>
    <div class="pack-hint" data-i18n="packHint">Kryds af efterhånden som du pakker hver ordre.</div>
    <div id="list"></div>
  </div>
</div>

<script>
(function(){
  var I18N = {
    da:{ title:'Pakkeliste', enterCode:'Indtast adgangskode', unlock:'Lås op', logout:'Log ud',
         back:'← Fulfillment', refresh:'↻ Opdatér', printList:'🖨 Udskriv', toPack:'Ordrer at pakke',
         none:'Ingen ordrer at pakke.', order:'Ordre', items:'varer', pcs:'stk.', wrongCode:'Forkert kode',
         netErr:'Netværksfejl', enterCodeShort:'Indtast kode', ordersWord:'ordrer', itemsTotal:'varer i alt',
         pickTotal:'Samlet plukkeliste', pickHint:'Tag i alt dette fra lageret:', packHint:'Kryds af efterhånden som du pakker hver ordre.',
         confTitle:'Ordrebekræftelse', confCustomer:'Kunde', confItems:'Varer', confTotal:'I alt', confPickup:'Afhentning (Click & Collect)', confThanks:'Tak for din ordre!', confPrinted:'Udskrevet', noPopup:'Tillad pop-ups for at printe ordrebekræftelserne.' },
    en:{ title:'Packing list', enterCode:'Enter passcode', unlock:'Unlock', logout:'Log out',
         back:'← Fulfillment', refresh:'↻ Refresh', printList:'🖨 Print', toPack:'Orders to pack',
         none:'No orders to pack.', order:'Order', items:'items', pcs:'pcs.', wrongCode:'Wrong code',
         netErr:'Network error', enterCodeShort:'Enter code', ordersWord:'orders', itemsTotal:'items total',
         pickTotal:'Total to pick', pickHint:'Take this much from stock in total:', packHint:'Tick off as you pack each order.',
         confTitle:'Order confirmation', confCustomer:'Customer', confItems:'Items', confTotal:'Total', confPickup:'Pickup (Click & Collect)', confThanks:'Thank you for your order!', confPrinted:'Printed', noPopup:'Allow pop-ups to print the order confirmations.' },
    es:{ title:'Lista de embalaje', enterCode:'Introduzca el código', unlock:'Desbloquear', logout:'Cerrar sesión',
         back:'← Preparación', refresh:'↻ Actualizar', printList:'🖨 Imprimir', toPack:'Pedidos para embalar',
         none:'No hay pedidos para embalar.', order:'Pedido', items:'artículos', pcs:'uds.', wrongCode:'Código incorrecto',
         netErr:'Error de red', enterCodeShort:'Introduzca el código', ordersWord:'pedidos', itemsTotal:'artículos en total',
         pickTotal:'Total a recoger', pickHint:'Coge esto del almacén en total:', packHint:'Marca a medida que preparas cada pedido.',
         confTitle:'Confirmación de pedido', confCustomer:'Cliente', confItems:'Artículos', confTotal:'Total', confPickup:'Recogida (Click & Collect)', confThanks:'¡Gracias por tu pedido!', confPrinted:'Impreso', noPopup:'Permita las ventanas emergentes para imprimir las confirmaciones.' }
  };
  var lang = localStorage.getItem('qm_pack_lang') || 'da';
  if(!I18N[lang]) lang = 'da';
  var lastData = null;

  function T(k){ return (I18N[lang] && I18N[lang][k]) || I18N.da[k] || k; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

  function applyLang(){
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el){ el.textContent = T(el.getAttribute('data-i18n')); });
    document.querySelectorAll('#langsw button').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-lang')===lang); });
    if(lastData) render(lastData);
  }

  document.getElementById('langsw').addEventListener('click', function(e){
    var b = e.target.closest('button[data-lang]'); if(!b) return;
    lang = b.getAttribute('data-lang'); localStorage.setItem('qm_pack_lang', lang); applyLang();
  });

  // ----- login (shares the /locker cookie) -----
  var loginEl = document.getElementById('login');
  var appEl = document.getElementById('app');
  var codeInput = document.getElementById('codeInput');
  var loginErr = document.getElementById('loginErr');

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  codeInput.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('refreshBtn').addEventListener('click', load);
  document.getElementById('printBtn').addEventListener('click', printAll);
  document.getElementById('logoutBtn').addEventListener('click', logout);

  async function doLogin(){
    loginErr.textContent='';
    var code = codeInput.value.trim();
    if(!code){ loginErr.textContent=T('enterCodeShort'); return; }
    try{
      var r = await fetch('/api/locker',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',code:code})});
      var d = await r.json().catch(function(){return {};});
      if(r.ok && d.ok){ codeInput.value=''; showApp(); load(); }
      else { loginErr.textContent = d.error || T('wrongCode'); }
    }catch(e){ loginErr.textContent=T('netErr'); }
  }

  async function logout(){
    try{ await fetch('/api/locker',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'logout'})}); }catch(e){}
    appEl.classList.add('hide'); loginEl.classList.remove('hide');
  }

  function showApp(){ loginEl.classList.add('hide'); appEl.classList.remove('hide'); }

  async function load(){
    try{
      var r = await fetch('/api/fulfill?action=list');
      if(r.status===401){ appEl.classList.add('hide'); loginEl.classList.remove('hide'); return; }
      var d = await r.json();
      if(!d.ok) return;
      showApp(); render(d);
    }catch(e){}
  }

  function itemCount(o){ return (o.items||[]).reduce(function(n,it){ return n + (it.qty||1); }, 0); }

  function itemLabel(it){
    return esc(it.name) + (it.weightLabel ? ' <span class="wl">'+esc(it.weightLabel)+'</span>' : '');
  }

  function render(d){
    lastData = d;
    var fulfilled = d.fulfilled || {};
    var orders = (d.orders || []).filter(function(o){ return o && !fulfilled[o.ref]; });

    var totalItems = orders.reduce(function(n,o){ return n + itemCount(o); }, 0);
    document.getElementById('summary').textContent =
      orders.length + ' ' + T('ordersWord') + ' · ' + totalItems + ' ' + T('itemsTotal');

    var pickTotalEl = document.getElementById('pickTotal');
    var list = document.getElementById('list');

    if(!orders.length){
      pickTotalEl.innerHTML = '';
      list.innerHTML = '<div class="empty">'+T('none')+'</div>';
      return;
    }

    // ---- Aggregate every item across all orders: what flour + weight, how many ----
    var agg = {};       // key -> { name, weightLabel, qty }
    var order = [];      // preserve first-seen order
    orders.forEach(function(o){
      (o.items||[]).forEach(function(it){
        var key = (it.name||'') + '||' + (it.weightLabel||'');
        if(!agg[key]){ agg[key] = { name:it.name, weightLabel:it.weightLabel, qty:0 }; order.push(key); }
        agg[key].qty += (it.qty||1);
      });
    });
    order.sort(function(a,b){ return agg[a].name.localeCompare(agg[b].name); });
    var ptRows = order.map(function(k){
      var it = agg[k];
      return '<div class="pt-row"><span class="nm">'+itemLabel(it)+'</span>'
           + '<span class="pt-badge">'+it.qty+' '+T('pcs')+'</span></div>';
    }).join('');
    pickTotalEl.innerHTML = '<div class="pick-total"><div class="pt-hint">'+T('pickHint')+'</div>'+ptRows+'</div>';

    // ---- Per-order packing cards (which order gets what) ----
    list.innerHTML = '';
    orders.forEach(function(o){
      var el = document.createElement('div');
      el.className = 'pack';
      var lis = (o.items||[]).map(function(it){
        return '<li><input type="checkbox" class="chk">'
          + '<span class="qtybadge">'+(it.qty||1)+'×</span>'
          + '<span class="nm">'+itemLabel(it)+'</span></li>';
      }).join('');
      el.innerHTML =
        '<div class="pack-top"><div class="pack-who">'+esc(o.name||'—')+'</div>'
        + '<div class="pack-ref">'+T('order')+' #'+esc(o.ref)+'</div></div>'
        + '<ul class="pack-items">'+lis+'</ul>'
        + '<div class="pack-count">'+itemCount(o)+' '+T('items')+'</div>';
      // Tick-off packing (visual)
      el.querySelectorAll('.pack-items li').forEach(function(li){
        var chk = li.querySelector('.chk');
        chk.addEventListener('change', function(){ li.classList.toggle('done', chk.checked); });
      });
      list.appendChild(el);
    });
  }

  // ---- Printable, branded Quartz Mølle order confirmations (one per order) ----
  var CONF_CSS =
    '*{box-sizing:border-box;margin:0;padding:0}'
    + 'body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1a1611;background:#fff}'
    + '.paper{max-width:720px;margin:0 auto;padding:40px 44px;page-break-after:always}'
    + '.paper:last-child{page-break-after:auto}'
    + '.head{display:flex;align-items:center;gap:16px;border-bottom:3px solid #273071;padding-bottom:18px;margin-bottom:22px}'
    + '.head img{width:66px;height:66px;object-fit:cover;border-radius:50%}'
    + '.head h1{font-size:22px;color:#273071;letter-spacing:.3px}'
    + '.head .sub{font-size:12.5px;color:#6b6256;margin-top:3px}'
    + '.meta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:13px;color:#6b6256;margin-bottom:20px}'
    + '.meta b{color:#1a1611}'
    + 'h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:#6b6256;margin:20px 0 8px}'
    + '.who{font-size:15px;font-weight:600}'
    + '.who small{display:block;font-weight:400;color:#6b6256;font-size:13px;margin-top:2px}'
    + 'table{width:100%;border-collapse:collapse;margin-top:6px}'
    + 'td{padding:10px 4px;border-bottom:1px solid #e7e1d6;font-size:14.5px;vertical-align:top}'
    + '.q{text-align:right;white-space:nowrap;font-weight:700;color:#273071;width:80px}'
    + '.wl{color:#6b6256;font-weight:400}'
    + '.total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:#273071;margin-top:16px;padding-top:14px;border-top:2px solid #273071}'
    + '.pickup{background:#faf7f2;border:1px solid #e7e1d6;border-radius:12px;padding:14px 16px;font-size:13.5px;margin-top:22px;line-height:1.6}'
    + '.foot{margin-top:28px;font-size:12px;color:#9b9488;text-align:center;line-height:1.7}'
    + '@media print{.paper{padding:24px 8mm}}';

  function buildConfirmation(o){
    var total = Number(o.total||0).toFixed(2).replace('.', ',');
    var rows = (o.items||[]).map(function(it){
      return '<tr><td>'+esc(it.name)+(it.weightLabel?' <span class="wl">('+esc(it.weightLabel)+')</span>':'')
        + '</td><td class="q">'+(it.qty||1)+' '+T('pcs')+'</td></tr>';
    }).join('') || '<tr><td colspan="2">—</td></tr>';
    var printed = new Date().toLocaleString(lang==='da'?'da-DK':(lang==='es'?'es-ES':'en-GB'),
      { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
    return '<div class="paper">'
      + '<div class="head"><img src="/images/logopng.png" alt="" onerror="this.style.display=\'none\'">'
      +   '<div><h1>'+T('confTitle')+'</h1><div class="sub">Quartz Mølle · Click &amp; Collect</div></div></div>'
      + '<div class="meta"><span>'+T('order')+' <b>#'+esc(o.ref)+'</b></span><span>'+T('confPrinted')+': <b>'+esc(printed)+'</b></span></div>'
      + '<h2>'+T('confCustomer')+'</h2><div class="who">'+esc(o.name||'—')+'<small>'+esc(o.email||'')+'</small></div>'
      + '<h2>'+T('confItems')+'</h2><table>'+rows+'</table>'
      + '<div class="total"><span>'+T('confTotal')+'</span><span>'+total+' kr.</span></div>'
      + '<div class="pickup"><b>'+T('confPickup')+'</b><br>Suså Landevej 101, 4160 Herlufmagle</div>'
      + '<div class="foot">'+T('confThanks')+'<br>Quartz Mølle · CVR 42117188 · hello@quartzmolle.dk</div>'
      + '</div>';
  }

  function printAll(){
    if(!lastData) return;
    var fulfilled = lastData.fulfilled || {};
    var orders = (lastData.orders||[]).filter(function(o){ return o && !fulfilled[o.ref]; });
    if(!orders.length){ alert(T('none')); return; }
    var pages = orders.map(buildConfirmation).join('');
    var doc = '<!doctype html><html lang="'+lang+'"><head><meta charset="utf-8">'
      + '<meta name="viewport" content="width=device-width, initial-scale=1">'
      + '<title>'+T('confTitle')+' · Quartz Mølle</title><style>'+CONF_CSS+'</style></head><body>'
      + pages
      + '<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},300);};<\/scr'+'ipt>'
      + '</body></html>';
    var w = window.open('', '_blank');
    if(!w){ alert(T('noPopup')); return; }
    w.document.open(); w.document.write(doc); w.document.close();
  }

  applyLang();
  load();

  // Keep the packing list in sync: once an order is sent (fulfilled) in /fufill
  // it drops off here automatically. Refresh when the tab regains focus and on a
  // light interval so it stays current without a manual reload.
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) load(); });
  window.addEventListener('focus', load);
  setInterval(function(){ if(!document.hidden) load(); }, 20000);
})();
</script>
</body>
</html>
