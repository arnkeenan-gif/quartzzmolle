<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Tak for din ordre! – Quartz Mølle</title>
  <link rel="icon" href="images/logo-small.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Page loader for success page only - shown during Stripe redirect */
    #page-loader {
      position: fixed;
      inset: 0;
      background: #273071;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 400ms ease;
    }
    #page-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
    }
    #page-loader img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      animation: spin-loader 1.1s linear infinite;
    }
    @keyframes spin-loader {
      to { transform: rotate(360deg); }
    }

    /* Blue nav on success page */
    .nav.nav-light {
      background: #273071 !important;
      box-shadow: 0 1px 0 rgba(0,0,0,0.1);
    }
    .nav.nav-light a,
    .nav.nav-light .nav-links a,
    .nav.nav-light .nav-logo {
      color: #fff !important;
    }
    .nav.nav-light .cart-btn,
    .nav.nav-light .cart-btn svg {
      color: #fff !important;
      stroke: #fff !important;
    }
    .nav.nav-light .cart-count {
      color: #fff;
      background: rgba(255,255,255,0.2);
    }
    .nav.nav-light .cart-count.has-items {
      background: #fff;
      color: #273071;
    }
    .nav.nav-light .nav-burger span {
      background: #fff !important;
    }
    .nav.nav-light .nav-cta {
      color: #273071 !important;
      background: #fff !important;
    }
    .nav.nav-light .nav-cta:hover {
      background: rgba(255,255,255,0.9) !important;
    }

    .success-page {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .success-box {
      background: #fff;
      border-radius: 20px;
      padding: 3.5rem 3rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }

    /* Animated blue checkmark circle */
    .success-check-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 1.75rem;
      position: relative;
    }
    .success-check-circle {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #273071;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: check-pop 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.15s both;
    }
    .success-check-svg {
      width: 44px;
      height: 44px;
    }
    .success-check-svg path {
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: check-draw 0.5s cubic-bezier(0.65, 0, 0.45, 1) 0.55s forwards;
    }
    @keyframes check-pop {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes check-draw {
      to { stroke-dashoffset: 0; }
    }

    .success-box h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 0.85rem;
      letter-spacing: -0.01em;
      animation: fade-up 0.5s ease 0.7s both;
    }
    .success-box p {
      color: #666;
      line-height: 1.7;
      margin-bottom: 1.5rem;
      animation: fade-up 0.5s ease 0.85s both;
    }
    .success-order-num {
      display: inline-block;
      background: #f5f1e8;
      color: #273071;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      font-size: 0.92rem;
      margin: 0 0 1.75rem;
      font-variant-numeric: tabular-nums;
      animation: fade-up 0.5s ease 1s both;
    }
    .success-order-num span {
      color: #888;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-right: 0.4rem;
    }
    .success-actions {
      animation: fade-up 0.5s ease 1.15s both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile optimizations */
    @media (max-width: 600px) {
      .success-page {
        padding: 1rem;
        align-items: flex-start;
        padding-top: calc(var(--nav-h) + 2rem);
      }
      .success-box {
        padding: 2.5rem 1.5rem 2rem;
        border-radius: 16px;
      }
      .success-check-wrap,
      .success-check-circle {
        width: 72px;
        height: 72px;
      }
      .success-check-svg {
        width: 36px;
        height: 36px;
      }
      .success-box h1 {
        font-size: 1.5rem;
        margin-bottom: 0.7rem;
      }
      .success-box p {
        font-size: 0.95rem;
        margin-bottom: 1.25rem;
      }
      .success-order-num {
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
        margin: 0 auto 1.5rem;
        max-width: 100%;
        text-align: center;
        word-break: break-all;
      }
      .success-actions .btn-dark {
        width: 100%;
        display: block;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div id="page-loader">
    <img src="images/logopng.png" alt="" />
  </div>
  <script>
    // Hide loader once page is fully loaded (DOM, images, fonts)
    window.addEventListener('load', function() {
      var loader = document.getElementById('page-loader');
      if (loader) {
        // Brief delay so the loader is visible at least 600ms (avoids flicker on fast networks)
        setTimeout(function() { loader.classList.add('is-hidden'); }, 600);
      }
    });
  </script>
  <nav class="nav nav-light" id="nav">
    <a href="index.html" class="nav-logo">
      <img src="images/logopng.png" alt="Quartz Mølle" class="brand-mark" />
      <img src="images/eu-organic.jpg" alt="EU Økologi" class="eco-mark" />
      <img src="images/statskontrolleret.png" alt="Statskontrolleret Økologisk" class="eco-mark" />
    </a>
    <div class="nav-links">
      <a href="index.html">Hjem</a>
      <a href="shop.html">Shop</a>
      <a href="forhandlere.html">Forhandlere</a>
      <a href="om.html" class="nav-btn">Om os</a>
      <a href="index.html#kontakt">Kontakt</a>
    </div>
    <a href="shop.html" class="nav-cta">Shop Nu</a>
    <button class="nav-burger" id="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Hjem</a>
    <a href="shop.html">Shop</a>
    <a href="forhandlere.html">Forhandlere</a>
    <a href="om.html">Om os</a>
    <a href="index.html#kontakt">Kontakt</a>
    <a href="shop.html" class="mobile-cta">Shop Nu</a>
  </div>

  <div class="success-page">
    <div class="success-box">
      <div class="success-check-wrap">
        <div class="success-check-circle">
          <svg class="success-check-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12 L10 17 L19 7" />
          </svg>
        </div>
      </div>
      <h1>Tak for din ordre!</h1>
      <p>Vi har modtaget din bestilling og pakker den hurtigst muligt. Du modtager en bekræftelse på email om kort tid.</p>
      <div class="success-order-num" id="success-order-num" style="display:none;"><span>Ordrenummer</span><strong id="order-num-value"></strong></div>
      <div class="success-actions">
        <a href="shop.html" class="btn-dark">Fortsæt shopping</a>
      </div>
    </div>
  </div>

  <script>
    // Read session_id from URL and show last 12 chars uppercased as the order number
    (function showOrderNumber() {
      try {
        var params = new URLSearchParams(window.location.search);
        var sid = params.get('session_id') || '';
        if (sid) {
          var ref = sid.slice(-12).toUpperCase();
          var box = document.getElementById('success-order-num');
          var val = document.getElementById('order-num-value');
          if (box && val) {
            val.textContent = ref;
            box.style.display = 'inline-block';
          }
        }
      } catch (e) { /* ignore */ }
    })();
  </script>

  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
