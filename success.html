<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#273071" id="theme-color-meta" />
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var m = document.getElementById('theme-color-meta');
      if (m) m.setAttribute('content', '#000000');
    });
  </script>
  <title>Tak for din ordre! – Quartz Mølle</title>
  <link rel="icon" href="images/logo-small.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .success-page {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .success-box {
      background: #fff;
      border-radius: 20px;
      padding: 4rem 3rem;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }
    .success-icon {
      width: 72px; height: 72px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .success-box h1 {
      font-family: 'Inter', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    .success-box p {
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <nav class="nav nav-light" id="nav">
    <a href="index.html" class="nav-logo">
      <img src="images/logopng.png" alt="Quartz Mølle" class="brand-mark" />
    </a>
    <div class="nav-links">
      <a href="index.html">Hjem</a>
      <a href="shop.html">Shop</a>
    </div>
  </nav>

  <div class="success-page">
    <div class="success-box">
      <div class="success-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Tak for din ordre!</h1>
      <p>Vi har modtaget din bestilling og sender dig en bekræftelse på email. Dit mel er snart på vej fra Quartz Mølle.</p>
      <a href="shop.html" class="btn-dark">Fortsæt shopping</a>
    </div>
  </div>

  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
