<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Tak for din ordre! – Quartz Mølle</title>
  <link rel="icon" href="images/logo-small.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Page loader for success page only - shown during Stripe redirect */
    #page-loader {
      position: fixed;
      inset: 0;
      background: #273071;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 400ms ease;
    }
    #page-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
    }
    #page-loader img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      animation: spin-loader 1.1s linear infinite;
    }
    @keyframes spin-loader {
      to { transform: rotate(360deg); }
    }

    /* Blue nav on success page */
    .nav.nav-light {
      background: #273071 !important;
      box-shadow: 0 1px 0 rgba(0,0,0,0.1);
    }
    .nav.nav-light a,
    .nav.nav-light .nav-links a,
    .nav.nav-light .nav-logo {
      color: #fff !important;
    }
    .nav.nav-light .cart-btn,
    .nav.nav-light .cart-btn svg {
      color: #fff !important;
      stroke: #fff !important;
    }
    .nav.nav-light .cart-count {
      color: #fff;
      background: rgba(255,255,255,0.2);
    }
    .nav.nav-light .cart-count.has-items {
      background: #fff;
      color: #273071;
    }
    .nav.nav-light .nav-burger span {
      background: #fff !important;
    }
    .nav.nav-light .nav-cta {
      color: #273071 !important;
      background: #fff !important;
    }
    .nav.nav-light .nav-cta:hover {
      background: rgba(255,255,255,0.9) !important;
    }

    .success-page {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .success-box {
      background: #fff;
      border-radius: 20px;
      padding: 4rem 3rem;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }
    .success-icon {
      width: 72px; height: 72px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .success-box h1 {
      font-family: 'Inter', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    .success-box p {
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div id="page-loader">
    <img src="images/logopng.png" alt="" />
  </div>
  <script>
    // Hide loader once page is fully loaded (DOM, images, fonts)
    window.addEventListener('load', function() {
      var loader = document.getElementById('page-loader');
      if (loader) {
        // Brief delay so the loader is visible at least 600ms (avoids flicker on fast networks)
        setTimeout(function() { loader.classList.add('is-hidden'); }, 600);
      }
    });
  </script>
  <nav class="nav nav-light" id="nav">
    <a href="index.html" class="nav-logo">
      <img src="images/logopng.png" alt="Quartz Mølle" class="brand-mark" />
      <img src="images/eu-organic.jpg" alt="EU Økologi" class="eco-mark" />
      <img src="images/statskontrolleret.png" alt="Statskontrolleret Økologisk" class="eco-mark" />
    </a>
    <div class="nav-links">
      <a href="index.html">Hjem</a>
      <a href="shop.html">Shop</a>
      <a href="forhandlere.html">Forhandlere</a>
      <a href="om.html" class="nav-btn">Om os</a>
      <a href="index.html#kontakt">Kontakt</a>
    </div>
    <a href="shop.html" class="nav-cta">Shop Nu</a>
    <button class="nav-burger" id="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Hjem</a>
    <a href="shop.html">Shop</a>
    <a href="forhandlere.html">Forhandlere</a>
    <a href="om.html">Om os</a>
    <a href="index.html#kontakt">Kontakt</a>
    <a href="shop.html" class="mobile-cta">Shop Nu</a>
  </div>

  <div class="success-page">
    <div class="success-box">
      <div class="success-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Tak for din ordre!</h1>
      <p>Vi har modtaget din bestilling og sender dig en bekræftelse på email. Dit mel er snart på vej fra Quartz Mølle.</p>
      <a href="shop.html" class="btn-dark">Fortsæt shopping</a>
    </div>
  </div>

  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
